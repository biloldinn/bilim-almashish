<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <header class="dashboard-header">
        <div class="logo">SkillSwap</div>
        <nav>
            <a href="#matches" class="active">Mosliklar</a>
            <a href="#chat">Chat</a>
            <a href="#certificates">Sertifikatlar</a>
            <a href="#profile">Profil</a>
            <button id="logoutBtn">Chiqish</button>
        </nav>
    </header>

    <div class="dashboard-container" data-aos="fade-up" data-aos-duration="800">
        <div id="matches" class="section active">
            <h2>Sizga mos topilganlar</h2>
            <div id="matchesList" class="matches-grid"></div>
        </div>

        <div id="chat" class="section">
            <div class="chat-container">
                <div class="chat-sidebar">
                    <h3>Chatlar</h3>
                    <div id="chatList"></div>
                </div>
                <div class="chat-main" id="activeChat" style="display:none;">
                    <div class="chat-header" id="chatHeader"></div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="Xabar yozing...">
                        <button id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
                        <button id="attachFileBtn"><i class="fas fa-paperclip"></i></button>
                        <button id="sendLocationBtn"><i class="fas fa-map-marker-alt"></i></button>
                        <button id="voiceMessageBtn"><i class="fas fa-microphone"></i></button>
                        <button id="videoCallBtn"><i class="fas fa-video"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="certificates" class="section">
            <h2>Sertifikatlarim</h2>
            <div id="certificatesList"></div>
        </div>

        <div id="profile" class="section">
            <h2 data-aos="fade-down">Mening Profilim</h2>
            <div class="profile-wrapper" data-aos="zoom-in" data-aos-duration="1000">
                <div class="profile-card">
                    <img id="profileImage" src="" alt="Profile">
                    <h3 id="profileName"></h3>
                    <p id="profilePhone"></p>
                    <p id="profileRole"></p>

                    <h4><i class="fas fa-book-open"></i> Fanlarim</h4>
                    <div id="profileSubjects"></div>

                    <button id="editProfileBtn"><i class="fas fa-user-edit"></i> Profilni tahrirlash</button>
                    <button id="logoutProfileBtn" class="logout-profile-btn"><i class="fas fa-sign-out-alt"></i>
                        Tizimdan chiqish</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SweetAlert2 and AOS JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Init AOS
        AOS.init({ once: true, offset: 50 });

        // SweetAlert Helper functions
        const showAlert = (icon, title, text) => {
            Swal.fire({
                icon: icon, title: title, text: text,
                background: '#1e293b', color: '#fff',
                confirmButtonColor: '#4f46e5',
                customClass: { popup: 'glass-panel' }
            });
        };
        const showToast = (icon, title) => {
            const Toast = Swal.mixin({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                timerProgressBar: true, background: '#1e293b', color: '#fff'
            });
            Toast.fire({ icon, title });
        };

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '/login.html';
        }

        const socket = io();
        let currentChatUserId = null;

        socket.emit('user_online', user.id);

        // Load matches
        async function loadMatches() {
            try {
                const response = await fetch('/api/matches');
                if (!response.ok) return;
                const matches = await response.json();

                const matchesList = document.getElementById('matchesList');
                if (matches.length === 0) {
                    matchesList.innerHTML = '<p class="text-muted" style="grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 1.1rem;">Hozircha mos keluvchi o\'quvchi yoki o\'qituvchilar topilmadi. Biroz kuting...</p>';
                    return;
                }

                matchesList.innerHTML = matches.map(match => {
                    const isTeacher = match.teacher._id === user.id;
                    const counterpart = isTeacher ? match.student : match.teacher;
                    if (!counterpart) return '';

                    const roleLabel = isTeacher ? "O'quvchi" : "O'qituvchi";

                    let buttonsHtml = '';
                    if (match.status === 'pending') {
                        buttonsHtml = `
                            <button onclick="acceptMatch('${match._id}')" style="background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3);"><i class="fas fa-check"></i> Qabul qilish</button>
                            <button onclick="rejectMatch('${match._id}')" class="reject" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3);"><i class="fas fa-times"></i> Rad etish</button>
                        `;
                    } else if (match.status === 'accepted') {
                        buttonsHtml = `<button onclick="startChat('${counterpart._id}', '${counterpart.firstName} ${counterpart.lastName}')" style="background: var(--gradient-primary); color: white; border: none; width: 100%; margin-top: 10px; font-size: 15px;"><i class="fas fa-comment"></i> Chatni boshlash</button>`;
                    }

                    let statusText = match.status === 'pending' ? 'Kutilmoqda...' : match.status === 'accepted' ? 'Qabul qilingan' : match.status;
                    let statusColor = match.status === 'pending' ? 'var(--warning)' : match.status === 'accepted' ? 'var(--success)' : 'var(--danger)';

                    return `
                    <div class="match-card">
                        <img src="${counterpart.profileImage || '/uploads/default-avatar.png'}" alt="">
                        <h4>${counterpart.firstName} ${counterpart.lastName} <span style="font-size: 13px; color: var(--primary-light);">(${roleLabel})</span></h4>
                        <p style="margin-top: 10px;">Fan: <strong>${match.subject.name}</strong></p>
                        <p>Status: <span class="badge" style="background: transparent; color: ${statusColor}; border: 1px solid ${statusColor}; padding: 4px 12px; margin: 8px 0 0 0; font-size: 12px;">${statusText}</span></p>
                        <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">${buttonsHtml}</div>
                    </div>
                `}).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function acceptMatch(matchId) {
            try {
                const response = await fetch('/api/accept-match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matchId })
                });
                if (response.ok) {
                    showToast('success', 'Taklif qabul qilindi!');
                    loadMatches();
                } else {
                    showToast('error', 'Xatolik yuz berdi');
                }
            } catch (error) {
                showToast('error', 'Tarmoq xatosi');
            }
        }

        function startChat(userId, userName) {
            currentChatUserId = userId;
            document.getElementById('activeChat').style.display = 'flex';
            document.getElementById('chatHeader').innerHTML = `<h3><i class="fas fa-user-circle"></i> ${userName} bilan chat</h3>`;
            document.getElementById('chatMessages').innerHTML = '';

            // Switch tabs visually
            document.querySelectorAll('header nav a').forEach(l => l.classList.remove('active'));
            document.querySelector('a[href="#chat"]').classList.add('active');

            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('chat').classList.add('active');
        }

        async function rejectMatch(matchId) {
            Swal.fire({
                title: 'Rad etmoqchimisiz?',
                text: "Bu amalni ortga qaytarib bo'lmaydi!",
                icon: 'warning',
                showCancelButton: true,
                background: '#1e293b',
                color: '#fff',
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#4f46e5',
                confirmButtonText: 'Ha, rad etish',
                cancelButtonText: 'Bekor qilish',
                customClass: { popup: 'glass-panel' }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const response = await fetch('/api/reject-match', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ matchId })
                        });
                        if (response.ok) {
                            showToast('success', 'Taklif rad etildi');
                            loadMatches();
                        }
                    } catch (err) {
                        showToast('error', 'Xatolik yuz berdi');
                    }
                }
            });
        }

        // Chat functionality
        socket.on('receive_message', (data) => {
            if (data.senderId === currentChatUserId) {
                displayMessage(data);
            }
        });

        socket.on('receive_location', (data) => {
            if (data.senderId === currentChatUserId) {
                displayLocation(data.location);
            }
        });

        socket.on('user_typing', (data) => {
            if (data.senderId === currentChatUserId) {
                // Show typing indicator
            }
        });

        socket.on('certificate_issued', (data) => {
            showAlert('success', 'Tabriklaymiz!', 'Sizga sertifikat berildi!');
            loadCertificates();
        });

        document.getElementById('sendMessageBtn').addEventListener('click', () => {
            const message = document.getElementById('messageInput').value;
            if (message && currentChatUserId) {
                socket.emit('send_message', {
                    senderId: user.id,
                    receiverId: currentChatUserId,
                    message,
                    type: 'text'
                });
                displayMessage({ message, type: 'text', senderId: user.id });
                document.getElementById('messageInput').value = '';
            }
        });

        document.getElementById('sendLocationBtn').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const location = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    socket.emit('send_location', {
                        senderId: user.id,
                        receiverId: currentChatUserId,
                        location
                    });
                    displayLocation(location);
                });
            }
        });

        function displayMessage(data) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.senderId === user.id ? 'sent' : 'received'}`;

            if (data.type === 'text') {
                messageDiv.textContent = data.message;
            } else if (data.type === 'image') {
                messageDiv.innerHTML = `<img src="${data.fileUrl}" alt="Image" style="max-width:200px;">`;
            } else if (data.type === 'voice') {
                messageDiv.innerHTML = `<audio controls src="${data.fileUrl}"></audio>`;
            } else if (data.type === 'video') {
                messageDiv.innerHTML = `<video controls src="${data.fileUrl}" style="max-width:200px;"></video>`;
            }

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function displayLocation(location) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message received';
            messageDiv.innerHTML = `
                <a href="https://www.google.com/maps?q=${location.lat},${location.lng}" target="_blank">
                    <i class="fas fa-map-marker-alt"></i> Lokatsiyani ko'rish
                </a>
            `;
            messagesDiv.appendChild(messageDiv);
        }

        document.getElementById('messageInput').addEventListener('input', () => {
            socket.emit('typing', {
                senderId: user.id,
                receiverId: currentChatUserId,
                isTyping: true
            });
        });

        // Load certificates
        async function loadCertificates() {
            const certificatesList = document.getElementById('certificatesList');
            certificatesList.innerHTML = '<p>Sertifikatlar yuklanmoqda...</p>';
            // Load from API
        }

        // Load profile
        document.getElementById('profileImage').src = user.profileImage || '/uploads/default-avatar.png';
        document.getElementById('profileName').textContent = `${user.firstName} ${user.lastName}`;
        document.getElementById('profilePhone').textContent = user.phone;
        document.getElementById('profileRole').textContent = user.role === 'teacher' ? 'O\'qituvchi' :
            user.role === 'student' ? 'O\'quvchi' : 'Ikkalasi';

        const profileSubjects = document.getElementById('profileSubjects');
        profileSubjects.innerHTML = user.subjects.map(s => `
            <span class="subject-tag ${s.level}">${s.name} (${s.level === 'weak' ? 'Zaif' : s.level === 'medium' ? 'O\'rtacha' : 'Kuchli'})</span>
        `).join('');

        // Navigation
        document.querySelectorAll('header nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('header nav a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(link.getAttribute('href').substring(1)).classList.add('active');
            });
        });

        // Make logout work for the profile button as well
        document.getElementById('logoutProfileBtn').addEventListener('click', async () => {
            document.getElementById('logoutBtn').click();
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            Swal.fire({
                title: 'Tizimdan chiqmoqchimisiz?',
                icon: 'question',
                showCancelButton: true,
                background: '#1e293b',
                color: '#fff',
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#4f46e5',
                confirmButtonText: 'Ha, chiqish',
                cancelButtonText: 'Bekor qilish',
                customClass: { popup: 'glass-panel' }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await fetch('/api/logout', { method: 'POST' });
                    localStorage.removeItem('user');
                    window.location.href = '/';
                }
            });
        });

        // Initialize
        loadMatches();
        loadCertificates();
    </script>
</body>

</html>
