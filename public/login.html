<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Kirish</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h2>Kirish</h2>
            <p>Telefon raqam va parolingiz bilan kiring</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Telefon raqam</label>
                <input type="tel" id="phone" required placeholder="+998 90 123 45 67">
            </div>

            <div class="form-group">
                <label>Parol</label>
                <input type="password" id="password" required placeholder="********">
            </div>

            <button type="submit" class="btn-submit">Kirish</button>
        </form>

        <div class="auth-footer">
            <p>Akkauntingiz yo'qmi? <a href="/register.html">Ro'yxatdan o'tish</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    alert(data.error || 'Xatolik yuz berdi');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Server bilan bog\'lanishda xatolik');
            }
        });
    </script>
</body>

</html>
