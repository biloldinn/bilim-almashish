<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Kirish</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body class="auth-page">
    <div class="auth-container animate__animated animate__zoomIn">
        <div class="auth-header">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Bosh sahifa</a>
            <h2>Xush kelibsiz!</h2>
            <p>Platformaga kirish uchun ma'lumotlarni kiriting</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Telefon raqam</label>
                <div class="input-with-icon">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" class="form-control" required placeholder="+998 90 123 45 67">
                </div>
            </div>

            <div class="form-group">
                <label>Parol</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-control" required placeholder="********">
                </div>
            </div>

            <button type="submit" class="btn-submit">Kirish</button>
        </form>

        <div class="auth-footer">
            <p>Akkauntingiz yo'qmi? <a href="/register.html">Ro'yxatdan o'tish</a></p>
        </div>
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Kirilmoqda...';
            btn.disabled = true;

            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));

                    const Toast = Swal.mixin({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 1500,
                        timerProgressBar: true,
                        background: '#1e293b',
                        color: '#fff',
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });

                    Toast.fire({
                        icon: 'success',
                        title: 'Tizimga muvaffaqiyatli kirdingiz'
                    }).then(() => {
                        window.location.href = '/dashboard.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Xatolik',
                        text: data.error || 'Parol yoki login noto\'g\'ri',
                        background: '#1e293b',
                        color: '#fff',
                        confirmButtonColor: '#4f46e5',
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Tarmoq xatosi',
                    text: 'Server bilan bog\'lanishda xatolik yuz berdi',
                    background: '#1e293b',
                    color: '#fff',
                    confirmButtonColor: '#4f46e5',
                });
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
